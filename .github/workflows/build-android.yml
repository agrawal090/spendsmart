name: Build Android APK

on:
  workflow_dispatch:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install dependencies
        run: npm install

      - name: Prepare web assets folder
        run: |
          mkdir -p www
          cp index.html app.css app.js firebase.js manifest.json sw.js www/
          mkdir -p www/icons
          cp icons/*.png www/icons/ 2>/dev/null || cp icon-*.png www/icons/ 2>/dev/null || true

      - name: Add Android platform
        run: test -d android || npx cap add android

      - name: Copy google-services.json
        run: |
          if [ -f google-services.json ]; then
            cp google-services.json android/app/google-services.json
            echo "google-services.json copied"
          else
            echo "WARNING: google-services.json not found"
          fi

      - name: Sync web assets
        run: npx cap sync android

      - name: Build debug APK
        working-directory: ./android
        run: chmod +x gradlew && ./gradlew assembleDebug

      # Generate debug keystore manually if it doesn't exist, then print SHA-1
      - name: Print debug SHA-1 fingerprint
        run: |
          mkdir -p ~/.android
          # Generate keystore if missing
          if [ ! -f ~/.android/debug.keystore ]; then
            echo "Generating debug keystore..."
            keytool -genkeypair \
              -keystore ~/.android/debug.keystore \
              -alias androiddebugkey \
              -keypass android \
              -storepass android \
              -dname "CN=Android Debug,O=Android,C=US" \
              -keyalg RSA \
              -keysize 2048 \
              -validity 10000
          fi
          echo ""
          echo "=========================================="
          echo "   COPY THIS SHA-1 INTO FIREBASE CONSOLE  "
          echo "=========================================="
          keytool -list -v \
            -keystore ~/.android/debug.keystore \
            -alias androiddebugkey \
            -storepass android \
            -keypass android | grep -E "SHA1:|SHA256:"
          echo "=========================================="
        continue-on-error: true

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: spendsmart-debug-apk
          path: android/app/build/outputs/apk/debug/app-debug.apk
